apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: messenger-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "messenger-server"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - messenger.example.com
      secretName: messenger-tls
  rules:
    - host: messenger.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: messenger-server
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: messenger-web
                port:
                  number: 80
