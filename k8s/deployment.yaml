apiVersion: apps/v1
kind: Deployment
metadata:
  name: messenger-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: messenger-server
  template:
    metadata:
      labels:
        app: messenger-server
    spec:
      containers:
        - name: server
          image: registry.example.com/messenger:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: messenger-config
            - secretRef:
                name: messenger-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: messenger-server
spec:
  selector:
    app: messenger-server
  ports:
    - port: 8080
      targetPort: 8080
