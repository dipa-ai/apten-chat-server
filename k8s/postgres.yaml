apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: messenger-db
spec:
  serviceName: messenger-db
  replicas: 1
  selector:
    matchLabels:
      app: messenger-db
  template:
    metadata:
      labels:
        app: messenger-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: messenger-db-secrets
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: messenger-db
spec:
  selector:
    app: messenger-db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
